name: Auto Fetch Stock Data 

on: 
  schedule: 
    - cron: '0 9 * * 1-5'  # Chạy lúc 16h00 T2-T6
  workflow_dispatch:       # Bật nút bấm thủ công

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs: 
  update-data: 
    runs-on: ubuntu-latest 
    steps: 
    - uses: actions/checkout@v4 
    
    - name: Setup Python 
      uses: actions/setup-python@v5 
      with: 
        python-version: '3.12' 
        
    - name: Install dependencies 
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy gspread oauth2client vnstock==0.2.8.2 tqdm
        
    - name: Run Script 
      env: 
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }} 
      run: |
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        python rs_worker.py
