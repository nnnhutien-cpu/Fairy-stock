name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn từ GitHub
      uses: actions/checkout@v4 

    - name: Cài đặt Python
      uses: actions/setup-python@v5 
      with:
        python-version: '3.12' 

    - name: Kích hoạt code đẩy dữ liệu (với Secret Key)
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        # 1. Ép máy chủ phải cài đặt oauth2client và các thư viện ngay tại đây
        python -m pip install --upgrade pip
        pip install vnstock gspread oauth2client google-auth plotly pandas yfinance
        
        # 2. Chạy file Python ngay sau khi cài xong
        python update_sheet.py
