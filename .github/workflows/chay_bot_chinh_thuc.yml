name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 
    - uses: actions/setup-python@v5 
      with:
        python-version: '3.12' 
    - name: Cài đặt và Chạy Bot
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        python -m pip install --upgrade pip
        # Cài đặt trọn bộ thư viện an toàn
        pip install vnstock==0.2.8.2 pandas numpy gspread google-auth oauth2client
        python update_sheet.py
