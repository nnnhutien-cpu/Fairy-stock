name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    # Chạy tự động vào lúc 16:00 chiều giờ Việt Nam (09:00 UTC) từ Thứ 2 đến Thứ 6
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Cho phép bạn bấm nút Run thủ công bất cứ lúc nào

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Tuyệt chiêu tắt cảnh báo vàng của GitHub

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn từ GitHub
      uses: actions/checkout@v4 # Đã nâng lên v4

    - name: Cài đặt Python
      uses: actions/setup-python@v5 # Đã nâng lên v5
      with:
        python-version: '3.12' # Chạy Python 3.12 tốc độ cao

    - name: Cài đặt TẤT CẢ thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install vnstock gspread google-auth plotly pandas yfinance

    - name: Kích hoạt code đẩy dữ liệu (với Secret Key)
      env:
        # BƯỚC CHỐT HẠ: Biến GCP_SA_KEY của code Python sẽ nhận giá trị từ chiếc hộp GOOGLE_CREDENTIALS của GitHub
        GCP_SA_KEY: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python update_sheet.py
