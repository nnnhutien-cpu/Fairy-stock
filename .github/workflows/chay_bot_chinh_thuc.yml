name: Bot Cao Data 17h (T2-T6)

on:
  schedule:
    - cron: '0 10 * * 1-5' # Chạy đúng 17h00 giờ VN (Từ Thứ 2 đến Thứ 6)
  workflow_dispatch: # Nút cho phép bạn bấm chạy thủ công để test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Keo code tu kho ve
      uses: actions/checkout@v4

    - name: Cai dat Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cai dat thu vien
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy gspread oauth2client vnstock tqdm

    - name: Tao file Credentials
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: echo "$GOOGLE_CREDENTIALS" > credentials.json

    - name: Chay Bot
      run: python bot_cdata.py
