name: Run RS Pipeline Bot Weekend
on:
  schedule:
    # 0 là Chủ Nhật, 6 là Thứ 7. Chạy lúc 9:00 UTC (tức 16:00 giờ Việt Nam)
    - cron: '0 9 * * 0,6' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kéo code từ kho về
        uses: actions/checkout@v4 
        
      - name: Cài đặt Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'
          
      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
          
      - name: Tạo file Chìa khóa từ Secret
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json
        
      - name: Khởi động Bot Cào Data
        run: python rs_worker.py
