name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    # Chạy tự động vào lúc 16:00 chiều giờ Việt Nam (09:00 UTC) từ Thứ 2 đến Thứ 6
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Cho phép bạn bấm nút Run thủ công bất cứ lúc nào

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn từ GitHub
      uses: actions/checkout@v3

    - name: Cài đặt Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # ✅ ĐÃ NÂNG CẤP LÊN BẢN 3.12

    - name: Cài đặt thư viện từ requirements.txt
      run: |
        pip install -r requirements.txt
        # Cài thêm 2 thư viện bắt buộc cho Google Sheets phòng trường hợp quên
        pip install gspread google-auth 

    - name: Kích hoạt code đẩy dữ liệu (với Secret Key)
      env:
        # Máy chủ sẽ tự động lôi biến GCP_SA_KEY từ Settings -> Secrets ra đây
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: python update_sheet.py
