name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    # Chạy tự động vào lúc 16:00 chiều giờ Việt Nam (09:00 UTC) từ Thứ 2 đến Thứ 6
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Cho phép bạn bấm nút Run thủ công bất cứ lúc nào

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn từ GitHub
      uses: actions/checkout@v3

    - name: Cài đặt Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # ✅ ĐÃ NÂNG CẤP LÊN BẢN 3.12

    - name: Cài đặt TẤT CẢ thư viện cần thiết
      run: |
        # Cài từ file requirements.txt (nếu có)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # Bổ sung trực tiếp các "đồ nghề" hay bị thiếu để đảm bảo code chạy 100%
        pip install vnstock gspread google-auth plotly pandas yfinance

    - name: Kích hoạt code đẩy dữ liệu (với Secret Key)
      env:
        # Máy chủ sẽ tự động lôi biến GCP_SA_KEY từ Settings -> Secrets ra đây
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      
      # LƯU Ý QUAN TRỌNG: Hãy đổi tên file dưới đây thành tên file bạn muốn chạy
      # (VD: python bot_yfinance.py HOẶC python rs_worker.py HOẶC python update_sheet.py)
      run: python update_sheet.py
