name: Bot Vnstock To Google Sheet

on:
  schedule:
    - cron: '0 9 * * 1-5' # 16h00 chiều giờ VN (Thứ 2 đến Thứ 6)
  workflow_dispatch:      # Bật nút bấm chạy bằng tay để test

# Tuyệt chiêu ép Node24 để tắt cảnh báo vàng của GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Kéo code về
      uses: actions/checkout@v4

    - name: Cài đặt Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy gspread oauth2client vnstock==0.2.8.2 tqdm

    - name: Tạo Chìa khóa Bí mật kết nối Google
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: echo "$GOOGLE_CREDENTIALS" > credentials.json

    - name: Bắt đầu cào và đẩy dữ liệu
      run: python bot_to_sheet.py
