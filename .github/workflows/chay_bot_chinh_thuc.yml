name: Bot Cập Nhật Dữ Liệu vnstock lên Google Sheets

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-update:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn từ GitHub
      uses: actions/checkout@v4 

    - name: Cài đặt Python
      uses: actions/setup-python@v5 
      with:
        python-version: '3.12' 

    - name: Kích hoạt code đẩy dữ liệu (với Secret Key)
      env:
        GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        python -m pip install --upgrade pip
        # Cài đặt chính xác danh sách thư viện của bạn (Không có oauth2client)
        pip install streamlit vnstock==0.2.8.2 pandas numpy plotly beautifulsoup4 supabase requests gspread google-auth tqdm
        python update_sheet.py
