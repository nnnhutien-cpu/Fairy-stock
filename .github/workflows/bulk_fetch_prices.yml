name: Bơm Cache Giá Cổ Phiếu (Bulk Fetch)

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 17h00 giờ VN (UTC+7), Thứ 2 - Thứ 6, sau giờ đóng cửa
  workflow_dispatch: {}  # Cho phép bấm "Run workflow" để chạy thủ công / test

permissions:
  contents: write  # cần quyền ghi để bot tự commit file data/stock_prices.csv ngược lại repo

jobs:
  bulk-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Kéo code về
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài đặt thư viện
        run: |
          python -m pip install --upgrade pip
          pip install "vnstock>=4.0.0" pandas

      - name: Chạy bot cào dữ liệu -> ghi ra data/stock_prices.csv
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python bulk_fetch_prices.py

      - name: Tự commit file data/stock_prices.csv ngược lại repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update stock_prices.csv"
          file_pattern: "data/stock_prices.csv"
