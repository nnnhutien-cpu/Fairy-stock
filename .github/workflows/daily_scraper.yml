name: Daily Auto Scraper Pipeline

on:
  schedule:
    # Chạy tự động vào lúc 16:00 chiều T2-T6 (Giờ VN)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
  
jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
    - name: Kéo code từ kho về
      uses: actions/checkout@v4

    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # --- CHẠY BOT SỐ 1: LỌC CỔ PHIẾU ---
    - name: Khởi động Bot Lọc RS & Thanh Khoản
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python rs_worker.py

    # --- CHẠY BOT SỐ 2: CÀO VIETSTOCK ---
    - name: Khởi động Bot Cào Báo Cáo Vietstock
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python bot_vietstock.py
